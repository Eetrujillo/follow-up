<div class="login-wrapper">
  <div class="login-container">
    <div class="logo-box">⚡</div>

    <h1 class="titulo">Follow-up</h1>
    <p class="subtitulo">Inicia sesion para continuar</p>

    <form>
      <div class="campo">
        <label>Correo electronico</label>
        <input type="email" placeholder="usuario@gmail.com">
      </div>

      <div class="campo">
        <label>contraseña</label>
        <div class="password-wrapper">
          <input type="password" placeholder="12345678">
          <span class="ojo">👁️</span>
        </div>
      </div>

      <button type="submit">Iniciar sesion</button>
    </form>

    <p class="pie">No tienes cuenta? <span>Registrate</span></p>
  </div>
</div>
